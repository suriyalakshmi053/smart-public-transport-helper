<!DOCTYPE html>
<html>
<head>
<title>Transport Helper</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<div class="card">

<h2 id="title">Login</h2>

<!-- LOGIN FORM -->
<div id="loginForm">

<input type="text" id="loginUser" placeholder="Username"><br>

<input type="password" id="loginPass" placeholder="Password"><br>

<button onclick="login()">Login</button>

<p>New user? 
<span onclick="showSignup()">Create Account</span>
</p>

</div>


<!-- SIGNUP FORM -->
<div id="signupForm" style="display:none">

<input type="text" id="user" placeholder="Username"><br>

<input type="email" id="email" placeholder="Email"><br>

<input type="password" id="pass" placeholder="Password"><br>

<input type="password" id="confirmPass" placeholder="Confirm Password"><br>

<button onclick="signup()">Create Account</button>

<p>Already have account? 
<span onclick="showLogin()">Login</span>
</p>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
